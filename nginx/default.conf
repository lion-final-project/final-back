server {
    listen 80;
    server_name lion-last.p-e.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lion-last.p-e.kr;

    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/lion-last.p-e.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lion-last.p-e.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # SSE 실시간 알림 (버퍼링 비활성화 필수)
    location /api/notifications/subscribe {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_set_header   Connection '';
        proxy_http_version 1.1;
        add_header         X-Accel-Buffering no;
    }

    # 실시간 배달 추적용 WebSocket (WSS 필수)
    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 백엔드 연동 (Docker Compose 서비스명 사용)
    location / {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
