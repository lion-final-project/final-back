name: CI/CD Pipeline for Spring Boot

on:
  push:
    branches: ["main"] # 필요에 따라 브랜치명 수정
  pull_request:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "corretto" # 또는 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # 테스트를 포함하려면 -x test 를 제거하세요 (단, DB 환경 등이 필요할 수 있음)
        run: ./gradlew clean build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/final-back:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # main 브랜치에 푸시될 때만 배포 실행

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Copy target files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yaml,nginx/"
          target: "~/final-back"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 배포 디렉토리로 이동
            cd ~/final-back

            # docker-compose.yaml에서 사용하는 DOCKER_USERNAME 환경변수 세팅
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            # 최신 이미지 Pull
            docker pull ${{ secrets.DOCKER_USERNAME }}/final-back:latest

            # 기존 컨테이너 중지 및 새 컨테이너 시작
            docker-compose down
            docker-compose up -d

            # 안 쓰는 이미지 정리
            docker image prune -f
